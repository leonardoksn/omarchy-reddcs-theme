$activeBorderColor = rgb(6c4ca0)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 18
    blur {
        enabled = true
        size = 2
        passes = 4
        noise = 0.0
    }
    shadow {
        enabled = true
        range = 18
        render_power = 6
        color = rgba(b45cd8dc)
        color_inactive = rgba(45395fef)
        offset = 2 2
      }
}

animations {
    bezier = bezier01, 0.65, 0, 0.35, 1

    animation = windows, 1, 5, bezier01, popin
    animation = windowsIn, 1, 4, bezier01, slidefade
  }